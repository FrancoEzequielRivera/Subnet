<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subnet — Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Manifest para instalación PWA -->
    <link rel="manifest" href="manifest.json">
    <!-- Color de la barra del navegador -->
    <meta name="theme-color" content="#111111">

    <!-- Soporte para iOS (Safari no usa el manifest para algunos valores) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Subnet">

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">

        <!-- Banner de instalación PWA (se muestra automáticamente si el navegador lo soporta) -->
        <div class="install-banner" id="installBanner">
            <span>Instalá Subnet para uso sin conexión</span>
            <button id="installBtn">Instalar</button>
            <button class="dismiss" id="dismissBanner" aria-label="Cerrar">×</button>
        </div>

        <!-- Encabezado -->
        <header class="header">
            <h1 class="brand">Subnet</h1>
            <p class="tagline">La net de las publicaciones</p>
        </header>

        <!-- Formulario de registro -->
        <main>
            <h2 class="form-title">Registro</h2>

            <div class="field">
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Usuario@gmail.com"
                    autocomplete="email"
                    inputmode="email"
                >
                <p class="field-error" id="email-error">Ingresá un correo válido</p>
            </div>

            <div class="field">
                <label for="username">Nombre de usuario</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Usuario"
                    autocomplete="username"
                    autocapitalize="none"
                    spellcheck="false"
                >
                <p class="field-error" id="username-error">El nombre de usuario no puede estar vacío</p>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="ContraseñaSegura1234"
                    autocomplete="new-password"
                >
                <p class="field-error" id="password-error">La contraseña debe tener al menos 8 caracteres</p>
            </div>

            <button class="btn-submit" id="registerBtn">Registrarse</button>

            <p class="form-footer">
                ¿Ya tenés cuenta? <a href="#">Iniciá sesión</a>
            </p>
        </main>

    </div>

    <!-- Toast de notificación -->
    <div class="toast" id="toast"></div>

    <!-- Lógica del formulario -->
    <script src="js/app.js"></script>

    <!-- Registramos el Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch((error) => console.log("Error:", error));
        }
    </script>

</body>

</html>
