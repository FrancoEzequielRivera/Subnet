<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subnet — Feed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Subnet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/feed.css">
</head>

<body>

    <!-- Barra superior -->
    <header class="topbar">
        <span class="topbar-brand">Subnet</span>
        <button class="topbar-btn" id="logoutBtn" aria-label="Cerrar sesión">
            <img src="assets/icons/Log_out.svg" alt="Cerrar sesión" width="28" height="28">
        </button>
    </header>

    <div class="divider"></div>

    <!-- Cuerpo principal -->
    <main class="feed-main">

        <p class="seccion-label">Feed</p>

        <div class="divider"></div>

        <!-- Las tarjetas se generan desde JS -->
        <div id="listadoPublicaciones"></div>

        <div id="spinnerCarga">Cargando...</div>

    </main>

    <!-- Botón flotante "+" -->
     <a href="mis_publicaciones.html">
        <button class="fab" aria-label="Nueva publicación">
        <img src="assets/icons/Plus.svg" alt="Nueva publicación" width="56" height="56">
    </button>
     </a>

    <!-- Barra de navegación inferior -->
    <nav class="bottom-nav">

        <a href="perfil.html" class="nav-item" data-page="perfil" aria-label="Perfil">
            <img src="assets/icons/User.svg" alt="Perfil">
        </a>

        <a href="feed.html" class="nav-item" data-page="feed" aria-label="Feed">
            <img src="assets/icons/Home.svg" alt="Feed">
        </a>

        <a href="mis_publicaciones.html" class="nav-item" data-page="publicaciones" aria-label="Publicaciones">
            <img src="assets/icons/Book.svg" alt="Publicaciones">
        </a>

    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="./js/feed.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch((error) => console.log("Error:", error));
        }
    </script>

</body>
</html>
