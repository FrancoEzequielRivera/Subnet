<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subnet — Publicación</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Subnet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/publicacion.css">
</head>

<body>

    <!-- Barra superior -->
    <header class="topbar">
        <span class="topbar-brand">Subnet</span>
        <button class="topbar-btn" id="logoutBtn" aria-label="Cerrar sesión">
            <img src="assets/icons/Log_out.svg" alt="Cerrar sesión" width="28" height="28">
        </button>
    </header>

    <div class="divider"></div>

    <main class="pub-main">

        <!-- Publicación completa -->
        <section class="pub-detalle" id="pubDetalle">
            <!-- Se rellena desde JS -->
        </section>

        <div class="divider"></div>

        <!-- Sección de comentarios -->
        <section class="comentarios-seccion">

            <h2 class="comentarios-titulo">Comentarios</h2>

            <!-- Lista de comentarios -->
            <div id="listadoComentarios">
                <!-- Se rellena desde JS -->
            </div>

            <!-- Campo para escribir un comentario -->
            <div class="comentario-form">
                <img src="assets/icons/User_feed.svg" alt="Tu avatar" class="comentario-avatar">
                <div class="comentario-input-wrapper">
                    <input
                        type="text"
                        id="nuevoComentario"
                        placeholder="Escribí un comentario..."
                        autocomplete="off"
                        maxlength="300"
                    >
                    <button id="enviarComentario" aria-label="Enviar comentario">
                        &#9658;
                    </button>
                </div>
            </div>

        </section>

    </main>

    <!-- Barra de navegación inferior -->
    <nav class="bottom-nav">

        <a href="perfil.html" class="nav-item" data-page="perfil" aria-label="Perfil">
            <img src="assets/icons/User.svg" alt="Perfil">
        </a>

        <a href="feed.html" class="nav-item" data-page="feed" aria-label="Feed">
            <img src="assets/icons/Home.svg" alt="Feed">
        </a>

        <a href="mis_publicaciones.html" class="nav-item" data-page="publicaciones" aria-label="Publicaciones">
            <img src="assets/icons/Book.svg" alt="Publicaciones">
        </a>

    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="js/publicacion.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch((error) => console.log("Error:", error));
        }
    </script>

</body>
</html>
