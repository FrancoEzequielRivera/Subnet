<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subnet — Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Manifest para instalación PWA -->
    <link rel="manifest" href="manifest.json">
    <!-- Color de la barra del navegador -->
    <meta name="theme-color" content="#111111">

    <!-- Soporte para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Subnet">

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

    <!-- Mismo CSS que el registro -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">

        <!-- Encabezado (idéntico al registro) -->
        <header class="header">
            <h1 class="brand">Subnet</h1>
            <p class="tagline">La net de las publicaciones</p>
        </header>

        <!-- Formulario de inicio de sesión -->
        <main>
            <h2 class="form-title">Inicio de sesión</h2>

            <div class="field">
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Usuario@gmail.com"
                    autocomplete="email"
                    inputmode="email"
                >
                <p class="field-error" id="email-error">Ingresá un correo válido</p>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña"
                    autocomplete="current-password"
                >
                <p class="field-error" id="password-error">Ingresá tu contraseña</p>
                <!-- Link alineado a la derecha, debajo del campo -->
                <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
            </div>

            <button class="btn-submit" id="loginBtn">Iniciar sesión</button>

            <p class="form-footer">
                ¿No tenés cuenta? <a href="index.html">Registrate</a>
            </p>
        </main>

    </div>

    <!-- Toast de notificación -->
    <div class="toast" id="toast"></div>

    <!-- Lógica del inicio de sesión -->
    <script type="module" src="js/login.js"></script>

    <!-- Registramos el Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch((error) => console.log("Error:", error));
        }
    </script>

</body>

</html>
